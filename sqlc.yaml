version: "2"
sql:
  - schema: "migrations/"
    queries: "internal/storage/postgres/queries.sql"
    engine: "postgresql"
    gen:
      go:
        package: "postgres"
        out: "internal/storage/postgres"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_empty_slices: true
        emit_interface: true
        emit_exact_table_names: false
        emit_prepared_queries: false
        emit_exported_queries: false
        emit_result_struct_pointers: true
        emit_params_struct_pointers: false
        emit_enum_valid_method: true
        emit_all_enum_values: true
        overrides:
          - db_type: "pg_catalog.timestamp timestamptz"
            go_type: "time.Time"
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
          - db_type: "pg_catalog.timestamp"
            go_type: "time.Time"
          - column: "research_topics.expanded_queries"
            go_type:
              import: "encoding/json"
              type: "RawMessage"
          - column: "research_topics.config"
            go_type:
              import: "encoding/json"
              type: "RawMessage"
          - column: "research_gaps.feasibility"
            go_type:
              import: "encoding/json"
              type: "RawMessage"
