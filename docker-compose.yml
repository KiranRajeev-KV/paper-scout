services:
  app:
    profiles: [app]
    build:
      context: .
    ports:
      - "8080:8080"
    environment:
      SERVER__HOST: 0.0.0.0
      DATABASE__POSTGRES__HOST: postgres
      DATABASE__REDIS__HOST: redis
      DATABASE__QDRANT__HOST: qdrant
      APIS__DOCLING__BASE_URL: http://docling:5001
      GENERATION__PROVIDER: ${GENERATION__PROVIDER:-ollama}
      GENERATION__GEMINI__API_KEY: ${GEMINI_API_KEY:-}
      GENERATION__OLLAMA__BASE_URL: http://host.docker.internal:11434
      GENERATION__OLLAMA__MODEL: ${OLLAMA_GENERATION_MODEL:-qwen3.5:4b-q4_K_M}
      EMBEDDING__BASE_URL: http://host.docker.internal:11434
    extra_hosts:
      - host.docker.internal:host-gateway
    volumes:
      - app_logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      docling:
        condition: service_healthy
    networks:
      - research-net
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: research
      POSTGRES_PASSWORD: research123
      POSTGRES_DB: research_agent
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U research -d research_agent"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - research-net
    restart: unless-stopped

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - research-net
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.18.2
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:6333/"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - research-net
    restart: unless-stopped

  docling:
    image: quay.io/docling-project/docling-serve-cu128:v1.21.0
    ports:
      - "8000:5001"
    environment:
      DOCLING_SERVE_ENABLE_UI: "false"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:5001/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    networks:
      - research-net
    restart: unless-stopped

volumes:
  app_logs:
  postgres_data:
  redis_data:
  qdrant_data:

networks:
  research-net:
    driver: bridge
