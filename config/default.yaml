server:
  host: localhost
  port: 8080
  read_timeout: 30s
  write_timeout: 30s

database:
  postgres:
    host: localhost
    port: 5432
    database: research_agent
    user: research
    password: research123
    sslmode: disable
    max_connections: 10
    max_idle: 5
    conn_timeout: 30s

  redis:
    host: localhost
    port: 6379
    password: ""
    db: 0
    pool_size: 10

  qdrant:
    host: localhost
    port: 6334
    collection: default
    api_key: ""

llm:
  provider: gemini
  api_key: ""
  model: gemini-2.5-flash
  embedding_model: gemini-embedding-001
  max_retries: 3
  base_backoff: 500ms
  max_backoff: 2s
  timeout: 30s
  max_output_tokens: 512
  requests_per_minute: 15
  requests_per_day: 1000

apis:
  semantic_scholar:
    api_key: ""
    base_url: "https://api.semanticscholar.org/graph/v1"
    rate_limit:
      requests_per_second: 0.33
      burst: 1
    timeout: 30s

  arxiv:
    base_url: "http://export.arxiv.org/api/query"
    rate_limit:
      requests_per_second: 0.33
      burst: 1
    timeout: 60s

  grobid:
    base_url: "http://localhost:8070"
    timeout: 60s

pipeline:
  max_papers: 50
  min_papers_for_analysis: 5
  papers_to_analyze: 20
  analysis_delay: 4s
  worker_pool_size: 10
  job_timeout: 60s
  pdf_download_timeout: 15s
  use_redis_queue: false

cache:
  default_ttl: 10m
  search_ttl: 60m
  embedding_ttl: 1440m

logging:
  level: info
  format: console
